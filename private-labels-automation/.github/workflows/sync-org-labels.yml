name: Sync Org Labels

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Apenas simular sem aplicar mudancas"
        required: false
        default: false
        type: boolean
      include_archived:
        description: "Incluir repositorios arquivados"
        required: false
        default: false
        type: boolean
      repo_name_regex:
        description: "Regex opcional para filtrar repositorios por nome"
        required: false
        default: ""
        type: string
      prune_unmanaged:
        description: "Apagar labels que nao estao no labels.json"
        required: false
        default: false
        type: boolean
  push:
    paths:
      - ".github/labels.json"
      - ".github/workflows/sync-org-labels.yml"
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  sync:
    if: github.event_name != 'push' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    env:
      ORG: ${{ github.repository_owner }}
      LABEL_FILE: .github/labels.json
      GH_TOKEN: ${{ secrets.ORG_LABELS_TOKEN }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      INCLUDE_ARCHIVED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_archived || 'false' }}
      REPO_NAME_REGEX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.repo_name_regex || '' }}
      PRUNE_UNMANAGED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prune_unmanaged || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate config and token
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Defina o secret ORG_LABELS_TOKEN com permissao para ler/escrever labels nos repos da org."
            exit 1
          fi

          if [[ ! -f "${LABEL_FILE}" ]]; then
            echo "::error::Arquivo de labels nao encontrado: ${LABEL_FILE}"
            exit 1
          fi

          jq -e '
            type == "array" and
            all(
              .[];
              (.name | type == "string" and length > 0) and
              (.color | type == "string" and length > 0)
            )
          ' "${LABEL_FILE}" >/dev/null

      - name: Sync labels to organization repositories
        shell: bash
        run: |
          set -euo pipefail

          total_repos=0
          processed_repos=0
          skipped_repos=0
          created=0
          updated=0
          deleted=0
          errors=0

          declare -A desired_labels=()
          while IFS= read -r desired_name; do
            desired_labels["${desired_name}"]=1
          done < <(jq -r '.[].name' "${LABEL_FILE}")

          while IFS= read -r repo_b64; do
            ((total_repos += 1))
            repo_json="$(printf '%s' "${repo_b64}" | base64 --decode)"
            repo_name="$(jq -r '.name' <<<"${repo_json}")"
            repo_full="$(jq -r '.full_name' <<<"${repo_json}")"
            is_archived="$(jq -r '.archived' <<<"${repo_json}")"

            if [[ "${INCLUDE_ARCHIVED}" != "true" && "${is_archived}" == "true" ]]; then
              ((skipped_repos += 1))
              echo "skip ${repo_full} (archived)"
              continue
            fi

            if [[ -n "${REPO_NAME_REGEX}" && ! "${repo_name}" =~ ${REPO_NAME_REGEX} ]]; then
              ((skipped_repos += 1))
              echo "skip ${repo_full} (regex)"
              continue
            fi

            ((processed_repos += 1))
            echo "sync ${repo_full}"

            while IFS= read -r label; do
              label_name="$(jq -r '.name' <<<"${label}")"
              label_color="$(jq -r '.color' <<<"${label}")"
              label_description="$(jq -r '.description // ""' <<<"${label}")"
              label_color="${label_color#\#}"

              if [[ ! "${label_color}" =~ ^[0-9a-fA-F]{6}$ ]]; then
                echo "::error::Cor invalida para label '${label_name}': ${label_color}"
                ((errors += 1))
                continue
              fi

              if [[ "${DRY_RUN}" == "true" ]]; then
                echo "[dry-run] upsert '${label_name}' em ${repo_full}"
                continue
              fi

              label_encoded="$(jq -rn --arg v "${label_name}" '$v|@uri')"
              if gh api "/repos/${repo_full}/labels/${label_encoded}" >/dev/null 2>&1; then
                if gh api -X PATCH "/repos/${repo_full}/labels/${label_encoded}" \
                  -f new_name="${label_name}" \
                  -f color="${label_color}" \
                  -f description="${label_description}" >/dev/null; then
                  ((updated += 1))
                else
                  echo "::warning::Falha ao atualizar '${label_name}' em ${repo_full}"
                  ((errors += 1))
                fi
              else
                if gh api -X POST "/repos/${repo_full}/labels" \
                  -f name="${label_name}" \
                  -f color="${label_color}" \
                  -f description="${label_description}" >/dev/null; then
                  ((created += 1))
                else
                  echo "::warning::Falha ao criar '${label_name}' em ${repo_full}"
                  ((errors += 1))
                fi
              fi
            done < <(jq -c '.[]' "${LABEL_FILE}")

            if [[ "${PRUNE_UNMANAGED}" == "true" ]]; then
              while IFS= read -r existing_label; do
                [[ -z "${existing_label}" ]] && continue
                if [[ -z "${desired_labels["${existing_label}"]+x}" ]]; then
                  if [[ "${DRY_RUN}" == "true" ]]; then
                    echo "[dry-run] delete '${existing_label}' em ${repo_full}"
                    continue
                  fi

                  existing_encoded="$(jq -rn --arg v "${existing_label}" '$v|@uri')"
                  if gh api -X DELETE "/repos/${repo_full}/labels/${existing_encoded}" >/dev/null 2>&1; then
                    ((deleted += 1))
                  else
                    echo "::warning::Falha ao apagar '${existing_label}' em ${repo_full}"
                    ((errors += 1))
                  fi
                fi
              done < <(gh api --paginate "/repos/${repo_full}/labels?per_page=100" --jq '.[].name')
            fi
          done < <(gh api --paginate "/orgs/${ORG}/repos?type=all&per_page=100" --jq '.[] | @base64')

          echo "resumo: total_repos=${total_repos} processed=${processed_repos} skipped=${skipped_repos} created=${created} updated=${updated} deleted=${deleted} errors=${errors}"
          if (( errors > 0 )); then
            exit 1
          fi
