name: "Sub-issue (Task)"
description: "Sub-issue no formato [SI] - Objetivo (sempre task)"
title: "[SI] - "
projects: ["CLT-Devops/3"]
type: "Task"
body:
  - type: markdown
    attributes:
      value: |
        Formato esperado do titulo:
        `[SI] - Objetivo`
        Regra:
        Sub-issue e sempre `Task`.

  - type: dropdown
    id: label
    attributes:
      label: Label
      description: Label obrigatoria para classificacao.
      options:
        - DB
        - AI
        - Code
        - Server
        - Domain
        - Story
        - API
        - Webhook
        - AWS
        - ETL
        - Docker
        - CI/CD
        - Log
        - QA
        - Sec
        - UI/UX
        - Layout
        - Component
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: Sub-issue e sempre task.
      options:
        - Task
      default: 0
    validations:
      required: true

  - type: input
    id: objective
    attributes:
      label: Objetivo
      description: Objetivo curto e direto para o sub-item.
      placeholder: "Criar migration para coluna status"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: Dependencias, criterios de aceite e detalhes tecnicos.
      placeholder: "Contexto completo do sub-item..."

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmacoes
      options:
        - label: Ajustarei o titulo final no formato [SI] - Objetivo.
          required: true
