name: "Feature request"
description: "Sugerir uma melhoria ou nova funcionalidade"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado pela sugestão. Contexto claro ajuda a priorização.

  - type: textarea
    id: problem
    attributes:
      label: Problema ou necessidade
      description: Qual dor você está tentando resolver?
      placeholder: "Hoje é difícil ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Solução proposta
      description: Como você sugere resolver?
      placeholder: "Sugiro adicionar ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Outras abordagens avaliadas.
      placeholder: "Também considerei ..."

  - type: textarea
    id: impact
    attributes:
      label: Impacto esperado
      description: Quem se beneficia e qual o ganho esperado?
      placeholder: "Reduz tempo de ... / melhora ..."

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmações
      options:
        - label: Verifiquei se já existe solicitação semelhante.
          required: true
        - label: Esta sugestão está alinhada com o objetivo do projeto.
          required: false
