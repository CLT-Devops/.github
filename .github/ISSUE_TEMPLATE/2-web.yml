name: "Issue Web"
description: "Vx.y.z.0 - [Label] [Type] Objetivo"
projects: ["CLT-Devops/3"]
type: "Task"
body:
  - type: input
    id: version
    attributes:
      label: Versao
      description: "Use o padrao Web com 4 blocos (ex.: V0.1.3.0)."
      placeholder: "V0.1.3.0"
    validations:
      required: true

  - type: dropdown
    id: label
    attributes:
      label: Label
      description: Label obrigatoria para classificacao.
      options:
        - DB
        - AI
        - Code
        - Server
        - Domain
        - Story
        - API
        - Webhook
        - AWS
        - ETL
        - Docker
        - CI/CD
        - Log
        - QA
        - Sec
        - UI/UX
        - Layout
        - Component
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: Type obrigatorio da issue.
      options:
        - Task
        - Bug
        - Improvement
        - Feature
        - Story
    validations:
      required: true

  - type: input
    id: objective
    attributes:
      label: Objetivo
      description: Objetivo curto e direto (entra no titulo).
      placeholder: "Ajustar layout da tela de login"
    validations:
      required: true

  - type: textarea
    id: description_text
    attributes:
      label: Descricao
      placeholder: "Descreva resumidamente a demanda..."
    validations:
      required: true
