name: Sync Issue Metadata

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Sync label, issue type, and title from issue form
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;

            const DOMAIN_LABELS = [
              "DB","AI","Code","Server","Domain","Story","API","Webhook","AWS",
              "ETL","Docker","CI/CD","Log","QA","Sec","UI/UX","Layout","Component"
            ];

            const TYPE_MAP = {
              task: "Task",
              bug: "Bug",
              feature: "Feature",
              improvement: "Feature",
              story: "Feature",
            };

            const body = (issue.body || "").replace(/\r\n/g, "\n");
            const isIssueForm = /^###\s*(Versao|Label|Type|Descricao|Descrição)\s*$/im.test(body);
            if (!isIssueForm) {
              core.info("Issue not created from configured issue form. Skipping.");
              return;
            }
            const htmlComments = body.match(/<!--[\s\S]*?-->/g) || [];

            function escapeRe(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function readFieldRaw(fieldName) {
              const re = new RegExp(
                `(^|\\n)###\\s*${escapeRe(fieldName)}\\s*\\n([\\s\\S]*?)(?=\\n###\\s|$)`,
                "i",
              );
              const match = body.match(re);
              if (!match) return "";
              const block = (match[2] || "").trim();
              return block;
            }

            function readField(fieldName) {
              const block = readFieldRaw(fieldName);
              if (!block) return "";
              const first = block
                .split("\n")
                .map((line) => line.trim())
                .filter((line) => line.length > 0 && !line.startsWith("- ["))[0] || "";
              return first.replace(/^`|`$/g, "").trim();
            }

            function readFieldMultiline(fieldName) {
              const block = readFieldRaw(fieldName);
              if (!block) return "";
              return block
                .split("\n")
                .map((line) => line.trimEnd())
                .filter((line) => !line.trim().startsWith("- ["))
                .join("\n")
                .trim();
            }

            function readCompactField(fieldName) {
              const re = new RegExp(
                `(^|\\n)${escapeRe(fieldName)}:\\s*(.+?)(?=\\n|$)`,
                "i",
              );
              const match = body.match(re);
              return match && match[2] ? match[2].trim() : "";
            }

            function parseStructuredTitle(value) {
              const raw = (value || "").trim();
              if (!raw) return null;

              let match = raw.match(/^(.+?)\s-\s\[([^\]]+)\]\[([^\]]+)\]\s-\s(.+)$/);
              if (match) {
                return {
                  version: match[1].trim(),
                  label: match[2].trim(),
                  type: match[3].trim(),
                  objective: match[4].trim(),
                };
              }

              match = raw.match(/^(.+?)\s-\s\[([^\]]+)\]\s\[([^\]]+)\]\s(.+)$/);
              if (match) {
                return {
                  version: match[1].trim(),
                  label: match[2].trim(),
                  type: match[3].trim(),
                  objective: match[4].trim(),
                };
              }

              return null;
            }

            function appendHtmlComments(text) {
              if (!text || htmlComments.length === 0) return text;
              const missing = htmlComments.filter((comment) => !text.includes(comment));
              if (missing.length === 0) return text;
              return `${text}\n${missing.join("\n")}`.trim();
            }

            function extractVersionFromStructuredTitle(value) {
              const raw = (value || "").trim();
              if (!raw) return "";

              let match = raw.match(/^(.+?)\s-\s\[[^\]]+\]\[[^\]]+\]\s-\s.+$/);
              if (match && match[1]) return match[1].trim();

              match = raw.match(/^(.+?)\s-\s\[[^\]]+\]\s\[[^\]]+\]\s.+$/);
              if (match && match[1]) return match[1].trim();

              return "";
            }

            async function getParentVersion(issueNumber) {
              try {
                const parentResp = await github.request(
                  "GET /repos/{owner}/{repo}/issues/{issue_number}/parent",
                  { owner, repo, issue_number: issueNumber },
                );
                const parentIssue = parentResp.data || {};
                const titleVersion = extractVersionFromStructuredTitle(parentIssue.title || "");
                if (titleVersion) return titleVersion;

                const parentBody = (parentIssue.body || "").replace(/\r\n/g, "\n");
                const bodyMatch = parentBody.match(/(^|\n)Versao:\s*(.+?)(?=\n|$)/i);
                return bodyMatch && bodyMatch[2] ? bodyMatch[2].trim() : "";
              } catch (err) {
                if (err.status === 404) return "";
                core.warning(`Could not load parent issue for #${issueNumber}: ${err.message}`);
                return "";
              }
            }

            function extractObjectiveFromTitle(value) {
              const raw = (value || "").trim();
              if (!raw) return "";

              let match = raw.match(/^\[SI\]\s*-\s*(.+)$/i);
              if (match && match[1]) return match[1].trim();

              match = raw.match(/^.+?\s-\s\[[^\]]+\]\[[^\]]+\]\s-\s(.+)$/);
              if (match && match[1]) return match[1].trim();

              match = raw.match(/^.+?\s-\s\[[^\]]+\]\s\[[^\]]+\]\s(.+)$/);
              if (match && match[1]) return match[1].trim();

              return raw;
            }

            const titleData = parseStructuredTitle(issue.title);
            const version = readField("Versao") || (titleData?.version || "") || readCompactField("Versao");
            const selectedLabel = readField("Label") || (titleData?.label || "") || readCompactField("Label");
            const selectedTypeRaw = readField("Type") || (titleData?.type || "") || readCompactField("Type");
            const objective =
              readField("Objetivo") ||
              (titleData?.objective || "") ||
              readCompactField("Objetivo") ||
              extractObjectiveFromTitle(issue.title);
            const descriptionText =
              readFieldMultiline("Descricao") || readFieldMultiline("Descrição");
            const selectedType = TYPE_MAP[(selectedTypeRaw || "").toLowerCase()] || "";

            core.info(`Issue #${issue.number}`);
            core.info(`Parsed: version='${version}', label='${selectedLabel}', type='${selectedTypeRaw}', objective='${objective}'`);

            // 1) Sync domain label from form.
            if (selectedLabel && DOMAIN_LABELS.includes(selectedLabel)) {
              const current = await github.paginate(
                github.rest.issues.listLabelsOnIssue,
                { owner, repo, issue_number: issue.number, per_page: 100 },
              );
              const currentNames = current.map((l) => l.name);
              const toRemove = currentNames.filter(
                (name) => DOMAIN_LABELS.includes(name) && name !== selectedLabel,
              );

              for (const name of toRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issue.number,
                    name,
                  });
                  core.info(`Removed domain label '${name}'`);
                } catch (err) {
                  core.warning(`Could not remove label '${name}': ${err.message}`);
                }
              }

              if (!currentNames.includes(selectedLabel)) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issue.number,
                    labels: [selectedLabel],
                  });
                  core.info(`Added domain label '${selectedLabel}'`);
                } catch (err) {
                  core.warning(`Could not add label '${selectedLabel}' (check if it exists in repo): ${err.message}`);
                }
              }
            }

            // 2) Sync issue type (Task/Bug/Feature) from form.
            if (selectedType) {
              try {
                const typeQuery = await github.graphql(
                  `query($owner: String!, $name: String!) {
                    repository(owner: $owner, name: $name) {
                      issueTypes(first: 20) {
                        nodes {
                          id
                          name
                          isEnabled
                        }
                      }
                    }
                  }`,
                  { owner, name: repo },
                );

                const types = typeQuery.repository.issueTypes.nodes || [];
                const target = types.find((t) => t.isEnabled && t.name === selectedType);

                if (!target) {
                  core.warning(`Issue type '${selectedType}' not found/enabled in repo '${owner}/${repo}'`);
                } else {
                  await github.graphql(
                    `mutation($id: ID!, $issueTypeId: ID!) {
                      updateIssue(input: { id: $id, issueTypeId: $issueTypeId }) {
                        issue {
                          number
                          issueType {
                            name
                          }
                        }
                      }
                    }`,
                    { id: issue.node_id, issueTypeId: target.id },
                  );
                  core.info(`Set issue type to '${selectedType}'`);
                }
              } catch (err) {
                core.warning(`Could not sync issue type: ${err.message}`);
              }
            }

            // 3) Normalize title and compact body from form.
            let desiredTitle = "";
            let compactBody = "";
            const isSubIssue =
              issue.title.trim().startsWith("[SI] -") ||
              (!version && !!selectedLabel && !!objective);

            if (isSubIssue && objective) {
              const parentVersion = await getParentVersion(issue.number);
              desiredTitle = parentVersion
                ? `${parentVersion} - [SI] - ${objective}`
                : `[SI] - ${objective}`;
              const bodyLines = [
                `Label: ${selectedLabel || "-"}`,
                "Type: Task",
                `Objetivo: ${objective}`,
              ];
              compactBody = descriptionText
                ? `${descriptionText}\n\n${bodyLines.join("\n")}`
                : bodyLines.join("\n");
            } else if (version && selectedLabel && selectedTypeRaw && objective) {
              desiredTitle = `${version} - [${selectedLabel}][${selectedTypeRaw}] - ${objective}`;
              const bodyLines = [
                `Versao: ${version}`,
                `Label: ${selectedLabel}`,
                `Type: ${selectedTypeRaw}`,
                `Objetivo: ${objective}`,
              ];
              compactBody = descriptionText
                ? `${descriptionText}\n\n${bodyLines.join("\n")}`
                : bodyLines.join("\n");
            }

            compactBody = appendHtmlComments(compactBody);

            const updatePayload = {
              owner,
              repo,
              issue_number: issue.number,
            };
            let shouldUpdate = false;

            if (desiredTitle && issue.title !== desiredTitle) {
              updatePayload.title = desiredTitle;
              shouldUpdate = true;
            }

            if (compactBody && (issue.body || "").trim() !== compactBody.trim()) {
              updatePayload.body = compactBody;
              shouldUpdate = true;
            }

            if (shouldUpdate) {
              await github.rest.issues.update(updatePayload);
              core.info("Updated issue metadata and compact body");
            }
